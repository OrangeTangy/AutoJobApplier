name: Release desktop builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: AutoJobApplier-windows
            archive_ext: zip
          - os: macos-latest
            artifact_name: AutoJobApplier-macos
            archive_ext: zip
          - os: ubuntu-latest
            artifact_name: AutoJobApplier-linux
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build frontend static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ""
        run: |
          npm ci
          npm run build

      - name: Bundle with PyInstaller
        working-directory: backend
        run: pyinstaller autojobapplier.spec --noconfirm --clean

      - name: Rename output folder
        shell: bash
        working-directory: backend/dist
        run: |
          if [ -d "AutoJobApplier" ]; then
            mv AutoJobApplier "${{ matrix.artifact_name }}"
          fi

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        working-directory: backend/dist
        run: |
          Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.artifact_name }}.zip" -Force

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        working-directory: backend/dist
        run: tar -czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: backend/dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          body: |
            ## AutoJobApplier ${{ github.ref_name }}

            Download the archive for your platform, extract it, and run `AutoJobApplier` (or `AutoJobApplier.exe` on Windows).

            Your data is stored under:
            - Windows: `%LOCALAPPDATA%\AutoJobApplier`
            - macOS: `~/Library/Application Support/AutoJobApplier`
            - Linux: `~/.local/share/AutoJobApplier`

            No Docker, no terminal, no API keys required.
