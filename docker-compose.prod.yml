version: "3.9"

# Production docker-compose.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required secrets (set via environment or .env.prod):
#   DATABASE_URL, REDIS_URL, JWT_SECRET_KEY, FERNET_KEY,
#   ANTHROPIC_API_KEY, CORS_ORIGINS, LOCAL_STORAGE_PATH
#
# TLS certificates must be placed in infra/nginx/certs/:
#   fullchain.pem  (certificate + intermediates)
#   privkey.pem    (private key)
#
# Generate with: certbot certonly --standalone -d yourdomain.com

x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  FERNET_KEY: ${FERNET_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
  LOCAL_STORAGE_PATH: /app/storage
  ENVIRONMENT: production
  LOG_LEVEL: INFO

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autojob}
      POSTGRES_USER: ${POSTGRES_USER:-autojob}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autojob}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # Do NOT expose port in production — access only via internal network

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: always
    environment:
      <<: *backend-env
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Celery Worker (ingestion + generation queues) ─────────────────────────────
  worker:
    build:
      context: backend
      dockerfile: Dockerfile.worker
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=default,ingestion,generation
      --concurrency=4
    environment:
      <<: *backend-env
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ── Celery Worker (submission queue — isolated, single concurrency) ────────────
  submission-worker:
    build:
      context: backend
      dockerfile: Dockerfile.worker
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=submission
      --concurrency=2
      --hostname=submission@%h
    environment:
      <<: *backend-env
    volumes:
      - app_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G  # Playwright needs memory
        reservations:
          memory: 512M

  # ── Celery Beat (scheduler) ───────────────────────────────────────────────────
  beat:
    build:
      context: backend
      dockerfile: Dockerfile
    restart: always
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler=celery.beat.PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *backend-env
    depends_on:
      - redis
    networks:
      - internal

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy + TLS ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Alembic migrations (run-once init job) ────────────────────────────────────
  migrate:
    build:
      context: backend
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  nginx_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true   # No direct internet access for internal services
  external:
    driver: bridge   # Only nginx reaches the outside
